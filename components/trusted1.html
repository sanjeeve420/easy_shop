<style>
/* ============================================
   TRUSTED SECTION - MARQUEE GALLERIES
   ============================================ */

/* ===== MARQUEE CONTAINER ===== */
.marquee-container {
  position: relative;
  overflow: hidden;
  width: 100%;
  -webkit-mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
  mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
}

/* ===== MARQUEE TRACK ===== */
.marquee-track {
  display: flex;
  gap: 20px;
  width: max-content;
  will-change: transform;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  transform: translate3d(0, 0, 0);
  -webkit-transform: translate3d(0, 0, 0);
}

/* ===== MARQUEE CARDS - NO PADDING ===== */
.marquee-card {
  flex-shrink: 0;
  width: 200px;
  height: 200px;
  border-radius: 24px;
  overflow: hidden;
  background: #ffffff;
  border: 1px solid #E5E7EB;
  box-shadow: 0 4px 24px -8px rgba(0, 0, 0, 0.06);
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  will-change: transform;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}

/* Image covers full card - NO PADDING */
.marquee-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  will-change: transform;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}

/* Desktop hover effects */
@media (hover: hover) {
  .marquee-card:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow: 0 20px 48px -12px rgba(0, 0, 0, 0.15);
  }
  
  .marquee-card:hover img {
    transform: scale(1.08);
  }
}

/* ===== ANIMATIONS - GPU Accelerated ===== */

/* Right to Left */
.marquee-rtl .marquee-track {
  animation: marqueeRTL 35s linear infinite;
}

.marquee-rtl.paused .marquee-track {
  animation-play-state: paused;
}

@keyframes marqueeRTL {
  0% {
    transform: translate3d(0, 0, 0);
  }
  100% {
    transform: translate3d(-50%, 0, 0);
  }
}

/* Left to Right */
.marquee-ltr .marquee-track {
  animation: marqueeLTR 35s linear infinite;
}

.marquee-ltr.paused .marquee-track {
  animation-play-state: paused;
}

@keyframes marqueeLTR {
  0% {
    transform: translate3d(-50%, 0, 0);
  }
  100% {
    transform: translate3d(0, 0, 0);
  }
}

/* ===== PAUSE ON HOVER ===== */
.marquee-container:hover .marquee-track {
  animation-play-state: paused;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .marquee-card {
    width: 160px;
    height: 160px;
    border-radius: 20px;
  }
  
  .marquee-track {
    gap: 14px;
  }
}

@media (max-width: 480px) {
  .marquee-card {
    width: 140px;
    height: 140px;
    border-radius: 18px;
  }
  
  .marquee-track {
    gap: 12px;
  }
}

/* ===== REDUCED MOTION ===== */
@media (prefers-reduced-motion: reduce) {
  .marquee-rtl .marquee-track,
  .marquee-ltr .marquee-track {
    animation-duration: 70s !important;
  }
}

/* ===== ANDROID OPTIMIZATIONS ===== */
.marquee-track {
  transform: translate3d(0, 0, 0) scale(1);
  -webkit-transform: translate3d(0, 0, 0) scale(1);
  perspective: 1000px;
  -webkit-perspective: 1000px;
}

.marquee-card {
  transform: translate3d(0, 0, 0);
  -webkit-transform: translate3d(0, 0, 0);
}

.marquee-card img {
  transform: translate3d(0, 0, 0);
  -webkit-transform: translate3d(0, 0, 0);
}
</style>

<script>
// ============================================
// TRUSTED SECTION - MARQUEE SCRIPT
// ============================================

(function() {
  'use strict';

  // ===== PAUSE ON HOVER =====
  const containers = document.querySelectorAll('.marquee-container[data-pause-on-hover="true"]');
  
  containers.forEach(function(container) {
    container.addEventListener('mouseenter', function() {
      this.classList.add('paused');
    });
    
    container.addEventListener('mouseleave', function() {
      this.classList.remove('paused');
    });
  });

  // ===== HANDLE VISIBILITY CHANGE =====
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      document.querySelectorAll('.marquee-track').forEach(function(track) {
        track.style.animationPlayState = 'paused';
      });
    } else {
      document.querySelectorAll('.marquee-track').forEach(function(track) {
        if (!track.closest('.marquee-container')?.classList.contains('paused')) {
          track.style.animationPlayState = 'running';
        }
      });
    }
  });

  console.log('✅ Trusted marquee galleries initialized');

})();
</script>
