<style>
  .sticky-nav {
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  body.sidebar-open {
    overflow: hidden;
    position: fixed;
    width: 100%;
  }

  #android-sidebar {
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
  }

  /* Hide scrollbar */
  .scrollbar-hide::-webkit-scrollbar {
    display: none;
  }
  
  .scrollbar-hide {
    -ms-overflow-style: none;
    scrollbar-width: none;
  }

  /* Open states */
  #android-sidebar.open #android-sidebar-backdrop {
    opacity: 1;
  }

  #android-sidebar.open #android-sidebar-panel {
    transform: translateX(0);
  }

  #android-sidebar-panel {
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }

  #android-sidebar a,
  #android-sidebar button {
    -webkit-tap-highlight-color: transparent;
  }

  @media (hover: hover) {
    .btn-primary:hover {
      transform: translateY(-2px);
    }

    .btn-outline:hover {
      transform: translateY(-2px);
    }
  }

  .btn-primary:active,
  .btn-outline:active {
    transform: scale(0.96);
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const openBtn = document.getElementById('android-sidebar-open');
    const closeBtn = document.getElementById('android-sidebar-close');
    const sidebar = document.getElementById('android-sidebar');
    const backdrop = document.getElementById('android-sidebar-backdrop');
    const body = document.body;

    // Make closeSidebar function globally available for inline onclick
    window.closeSidebar = function() {
      closeSidebar();
    };

    function openSidebar() {
      if (!sidebar) return;
      sidebar.classList.remove('hidden');
      requestAnimationFrame(() => sidebar.classList.add('open'));
      sidebar.setAttribute('aria-hidden', 'false');
      openBtn?.setAttribute('aria-expanded', 'true');
      body.classList.add('sidebar-open');
    }

    function closeSidebar() {
      if (!sidebar) return;
      sidebar.classList.remove('open');
      sidebar.setAttribute('aria-hidden', 'true');
      openBtn?.setAttribute('aria-expanded', 'false');
      body.classList.remove('sidebar-open');
      setTimeout(() => sidebar.classList.add('hidden'), 200);
    }

    openBtn?.addEventListener('click', openSidebar);
    closeBtn?.addEventListener('click', closeSidebar);
    backdrop?.addEventListener('click', closeSidebar);

    sidebar?.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', closeSidebar);
    });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && sidebar && !sidebar.classList.contains('hidden')) {
        closeSidebar();
      }
    });
  });
</script>
